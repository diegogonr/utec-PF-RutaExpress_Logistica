apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-comite
  labels:
    app: demo-comite
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-comite
  template:
    metadata:
      labels:
        app: demo-comite
    spec:
      containers:
        - name: demo-comite
          image: acrrutaexpressmvp.azurecr.io/demo-comite:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3080
            - containerPort: 3443
          env:
            - name: PORT
              value: "3080"
            - name: TLS_PORT
              value: "3443"
            - name: PUBLIC_HOST
              value: "rutaexpress-demo-comite.eastus.cloudapp.azure.com"
            - name: SERVICE_BUS_CONNECTION_STRING
              value: "__SERVICE_BUS_CONNECTION_STRING__"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3080
            initialDelaySeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3080
            initialDelaySeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: demo-comite
  annotations:
    service.beta.kubernetes.io/azure-dns-label-name: rutaexpress-demo-comite
    service.beta.kubernetes.io/azure-load-balancer-health-probe-protocol: Tcp
spec:
  type: LoadBalancer
  selector:
    app: demo-comite
  ports:
    - name: http
      port: 80
      targetPort: 3080
    - name: https
      port: 443
      targetPort: 3443
