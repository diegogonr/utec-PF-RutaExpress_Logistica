apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  labels:
    app.kubernetes.io/name: inventory-service
    app.kubernetes.io/component: MS-INI01-02
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: inventory-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8081
          env:
            - name: SQL_SERVER
              value: {{ .Values.env.sqlServer | quote }}
            - name: SQL_DATABASE
              value: {{ .Values.env.sqlDatabase | quote }}
            - name: SQL_USER
              value: {{ .Values.env.sqlUser | quote }}
            - name: SQL_PASSWORD
              value: {{ .Values.env.sqlPassword | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: inventory-service
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8081
