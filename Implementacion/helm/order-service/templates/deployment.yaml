apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "order-service.fullname" . }}
  labels:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/component: APP-02
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: order-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: order-service
        app.kubernetes.io/component: APP-02
    spec:
      containers:
        - name: order-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: APP_ID
              value: {{ .Values.env.appId | quote }}
            - name: SERVICE_NAME
              value: {{ .Values.env.serviceName | quote }}
            - name: SQL_SERVER
              value: {{ .Values.env.sqlServer | quote }}
            - name: SQL_DATABASE
              value: {{ .Values.env.sqlDatabase | quote }}
            - name: SQL_USER
              value: {{ .Values.env.sqlUser | quote }}
            - name: SQL_PASSWORD
              value: {{ .Values.env.sqlPassword | quote }}
            - name: REDIS_HOST
              value: {{ .Values.env.redisHost | quote }}
            - name: REDIS_PORT
              value: {{ .Values.env.redisPort | quote }}
            - name: REDIS_PASSWORD
              value: {{ .Values.env.redisPassword | quote }}
            - name: REDIS_TLS
              value: {{ .Values.env.redisTls | quote }}
            - name: INVENTORY_SERVICE_URL
              value: {{ .Values.env.inventoryServiceUrl | quote }}
            - name: MOCK_WMS_URL
              value: {{ .Values.env.mockWmsUrl | quote }}
            - name: APIM_SUBSCRIPTION_KEY
              value: {{ .Values.env.apimSubscriptionKey | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "order-service.fullname" . }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: order-service
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8080
